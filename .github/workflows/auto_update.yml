name: KBO Schedule Auto Updater

on:
  schedule:
    # 💡 UTC 시간 기준 (한국 시간 오전 8시 = UTC 전날 23시)
    - cron: '0 23 * * *'
  workflow_dispatch: # 필요할 때 깃허브 웹에서 수동으로도 실행 가능하게 설정

jobs:
  update-sheet:
    runs-on: ubuntu-latest
    steps:
    - name: 저장소 코드 가져오기
      uses: actions/checkout@v3

    - name: 파이썬 개발환경 세팅
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 필수 라이브러리 설치
      run: |
        pip install requests gspread google-auth

    - name: 크롤러 실행 및 구글 시트 업데이트
      env:
        GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
      run: python update_kbo.py
